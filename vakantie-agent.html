<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vakantie BV — Ontology Agent Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#060b14;color:#e5e7eb;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#f97316;animation:bounce 1.2s infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  textarea:focus,input:focus{outline:none}
  button{transition:opacity 0.15s}
  button:hover:not(:disabled){opacity:0.8}
  button:disabled{cursor:not-allowed;opacity:0.5}
  .md p{margin:0 0 8px 0}.md p:last-child{margin:0}
  .md strong{color:#f9fafb;font-weight:600}
  .md em{color:#d1d5db;font-style:italic}
  .md ul,.md ol{margin:4px 0 8px 18px;padding:0}
  .md li{margin:2px 0}
  .md h1,.md h2,.md h3{color:#f9fafb;margin:8px 0 4px 0;font-size:18px;font-weight:700}
  .md h2{font-size:17px}.md h3{font-size:16px}
  .md code{background:rgba(249,115,22,0.15);color:#f97316;padding:1px 4px;border-radius:3px;font-size:14px;font-family:monospace}
  .md pre{background:#0a0f1a;border:1px solid #1f2937;border-radius:6px;padding:8px 10px;margin:6px 0;overflow-x:auto}
  .md pre code{background:none;padding:0;color:#9ca3af}
  .md table{border-collapse:collapse;margin:6px 0;font-size:14px;width:100%}
  .md th,.md td{border:1px solid #1f2937;padding:4px 10px;text-align:left}
  .md th{background:rgba(249,115,22,0.1);color:#f97316;font-weight:600}
  .md hr{border:none;border-top:1px solid #1f2937;margin:8px 0}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ─── UI CONFIG (frontend-only: icons, kleuren, grafiekposities) ──
const UI_CONFIG = {
  "vakantie:Klant":      {icon:"👤", color:"#f97316"},
  "vakantie:Bestemming":  {icon:"🗺️", color:"#22c55e"},
  "vakantie:Hotel":      {icon:"🏨", color:"#3b82f6"},
  "vakantie:Boeking":    {icon:"📋", color:"#a855f7"},
};
const POS = {"vakantie:Klant":{x:70,y:60},"vakantie:Boeking":{x:200,y:155},"vakantie:Hotel":{x:330,y:60},"vakantie:Bestemming":{x:330,y:240}};

const QUICK = [
  {label:"📋 Boekingen Sofia",   text:"Wat zijn alle boekingen van Sofia Martins (klant 3)?"},
  {label:"🏖️ Hotels Bali",       text:"Welke hotels in Bali hebben nog kamers beschikbaar?"},
  {label:"➕ Boek voor Lars",    text:"Boek voor Lars van den Berg (klant 4) hotel Komaneka at Bisma (hotel_id 4) in Bali van 15 september tot 22 september 2025 voor 2 personen."},
  {label:"❌ Annuleer boeking 4",text:"Annuleer boeking 4 van Sofia Martins."},
  {label:"⭐ Punten Anna",       text:"Voeg 500 bonus loyalty punten toe aan Anna de Vries (klant 1)."},
];

// ─── ONTOLOGY GRAPH ──────────────────────────────────────────
function Graph({active, classes, rels}) {
  return (
    <svg viewBox="0 10 400 300" style={{width:"100%",height:"210px"}}>
      <defs>
        <marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0L6,3L0,6Z" fill="#374151"/>
        </marker>
        <marker id="aa" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0L6,3L0,6Z" fill="#f97316"/>
        </marker>
      </defs>
      {rels.map(r=>{
        const f=POS[r.from],t=POS[r.to];
        if (!f||!t) return null;
        const dx=t.x-f.x,dy=t.y-f.y,len=Math.sqrt(dx*dx+dy*dy);
        const ux=dx/len,uy=dy/len,pad=30;
        const on=active.has(r.from)||active.has(r.to);
        return (
          <g key={r.label}>
            <line x1={f.x+ux*pad} y1={f.y+uy*pad} x2={t.x-ux*pad} y2={t.y-uy*pad}
              stroke={on?"#f97316":"#1f2937"} strokeWidth={on?2:1.5}
              strokeDasharray={on?"none":"4,3"} markerEnd={`url(#${on?"aa":"a"})`}
              style={{transition:"all 0.4s"}}/>
            <text x={(f.x+t.x)/2} y={(f.y+t.y)/2-6} textAnchor="middle" fontSize="8"
              fill={on?"#f97316":"#4b5563"} fontFamily="monospace">{r.label}</text>
          </g>
        );
      })}
      {classes.map(c=>{
        const p=POS[c.id],on=active.has(c.id);
        if (!p) return null;
        return (
          <g key={c.id}>
            <circle cx={p.x} cy={p.y} r={27} fill={on?c.color+"20":"#0f172a"}
              stroke={on?c.color:"#1f2937"} strokeWidth={on?2.5:1.5}
              style={{filter:on?`drop-shadow(0 0 10px ${c.color})`:"none",transition:"all 0.4s"}}/>
            <text x={p.x} y={p.y-2} textAnchor="middle" fontSize="15">{c.icon}</text>
            <text x={p.x} y={p.y+14} textAnchor="middle" fontSize="8" fontWeight="600"
              fill={on?c.color:"#6b7280"} fontFamily="monospace">{c.label}</text>
            <rect x={p.x-27} y={p.y+21} width="54" height="13" rx="3"
              fill={on?c.color+"18":"#111827"} stroke={on?c.color:"#1f2937"} strokeWidth="1"/>
            <text x={p.x} y={p.y+30} textAnchor="middle" fontSize="7"
              fill={on?c.color:"#374151"} fontFamily="monospace">db:{c.table}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ─── DATA TABLE ───────────────────────────────────────────────
function DataTable({rows,flashSet,pk}) {
  if (!rows.length) return <div style={{color:"#4b5563",fontSize:"14px",padding:"8px"}}>Leeg</div>;
  const cols = Object.keys(rows[0]);
  return (
    <div style={{overflowX:"auto",fontSize:"14px",fontFamily:"monospace"}}>
      <table style={{borderCollapse:"collapse",minWidth:"500px",width:"100%"}}>
        <thead>
          <tr style={{borderBottom:"1px solid #1f2937"}}>
            {cols.map(c=><th key={c} style={{padding:"4px 8px",textAlign:"left",color:"#4b5563",fontWeight:500,whiteSpace:"nowrap"}}>{c}</th>)}
          </tr>
        </thead>
        <tbody>
          {rows.map((row,i)=>{
            const isF = flashSet && flashSet.has(row[pk]);
            return (
              <tr key={i} style={{background:isF?"rgba(249,115,22,0.15)":i%2?"rgba(255,255,255,0.02)":"transparent",borderLeft:isF?"2px solid #f97316":"2px solid transparent",transition:"all 0.5s"}}>
                {cols.map(c=>(
                  <td key={c} style={{padding:"3px 8px",color:c===pk?"#f97316":"#d1d5db",whiteSpace:"nowrap"}}>
                    {c==="status"
                      ?<span style={{padding:"2px 8px",borderRadius:"12px",fontSize:"13px",background:row[c]==="bevestigd"?"rgba(34,197,94,0.2)":row[c]==="geannuleerd"?"rgba(239,68,68,0.2)":"rgba(234,179,8,0.2)",color:row[c]==="bevestigd"?"#4ade80":row[c]==="geannuleerd"?"#f87171":"#fbbf24"}}>{row[c]}</span>
                      :c==="sterren"?"★".repeat(row[c])
                      :c==="prijs"||c==="loyalty_punten"?`€${Number(row[c]).toLocaleString("nl-NL")}`
                      :String(row[c])}
                  </td>
                ))}
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────
function App() {
  const [db, setDb] = useState({klanten:[],bestemmingen:[],hotels:[],boekingen:[]});
  const dbRef = useRef(db);
  useEffect(()=>{dbRef.current=db;},[db]);

  const [classes, setClasses] = useState([]);
  const [rels, setRels] = useState([]);
  const [tools, setTools] = useState([]);
  const [turtle, setTurtle] = useState("");
  const [metaLoaded, setMetaLoaded] = useState(false);

  const [tab, setTab] = useState("klanten");
  const [flashMap, setFlashMap] = useState({});
  const [activeC, setActiveC] = useState(new Set());
  const [traces, setTraces] = useState([]);
  const [msgs, setMsgs] = useState([
    {role:"assistant",text:"Hallo! Ik ben de Vakantie BV database-agent. Ik gebruik de OWL-ontologie en een RDFLib triplestore om vragen te vertalen naar SPARQL queries. Klik een snelkoppeling of stel een vraag!"}
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [view, setView] = useState("chat");
  const [agentRole, setAgentRole] = useState("reisagent");
  const chatEnd = useRef(null);

  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);

  // Helper: zoek klasse op tabelnaam (vervangt globale CLASSES lookup)
  const findClassByTable = useCallback((table) => classes.find(c=>c.table===table), [classes]);
  // Helper: primary key per tabel (vervangt globale PKM)
  const getPk = useCallback((table) => { const c = findClassByTable(table); return c ? c.pk : null; }, [findClassByTable]);

  const flash = useCallback((table, pks) => {
    const cls = findClassByTable(table);
    if (cls) {
      setActiveC(p=>new Set([...p,cls.id]));
      setTimeout(()=>setActiveC(p=>{const n=new Set(p);n.delete(cls.id);return n;}),2000);
    }
    setTab(table);
    setFlashMap(p=>({...p,[table]:new Set(pks)}));
    setTimeout(()=>setFlashMap(p=>({...p,[table]:new Set()})),2500);
  },[findClassByTable]);

  const API_BASE = "http://localhost:8000";

  const refreshState = async () => {
    try {
      const res = await fetch(`${API_BASE}/state`);
      if (res.ok) {
        const state = await res.json();
        setDb(state);
        dbRef.current = state;
      }
    } catch(e) { console.warn("State refresh failed:", e); }
  };

  // Haal ontologie-metadata, Turtle en data op bij opstart
  useEffect(() => {
    Promise.all([
      fetch(`${API_BASE}/ontology/meta`).then(r=>r.ok?r.json():null),
      fetch(`${API_BASE}/graph/turtle`).then(r=>r.ok?r.json():null),
      fetch(`${API_BASE}/state`).then(r=>r.ok?r.json():null),
    ]).then(([meta, ttl, state]) => {
      if (meta) {
        setClasses(meta.classes.map(c=>({...c, ...(UI_CONFIG[c.id]||{icon:"?",color:"#6b7280"})})));
        setRels(meta.relationships);
        setTools(meta.tools);
      }
      if (ttl) setTurtle(ttl.turtle || "");
      if (state) { setDb(state); dbRef.current = state; }
      setMetaLoaded(true);
    }).catch(e => { console.warn("Init fetch failed:", e); setMetaLoaded(true); });
  }, []);

  const send = async(text) => {
    if (!text.trim() || loading) return;
    setLoading(true); setInput("");
    setMsgs(p=>[...p,{role:"user",text}]);
    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:text, role:agentRole})
      });
      if (!res.ok) { const e=await res.text(); throw new Error(`API ${res.status}: ${e.slice(0,100)}`); }
      const data = await res.json();
      setMsgs(p=>[...p,{role:"assistant",text:data.response}]);
      await refreshState();
    } catch(e) { setMsgs(p=>[...p,{role:"assistant",text:`Fout: ${e.message}`}]); }
    setLoading(false);
  };

  const S = { // shared styles
    panel: {flex:1,display:"flex",flexDirection:"column",overflow:"hidden"},
    hdr: {padding:"8px 14px",borderBottom:"1px solid #111827",fontSize:"13px",color:"#4b5563",fontFamily:"monospace",letterSpacing:"0.1em"},
    card: {background:"rgba(255,255,255,0.04)",border:"1px solid #1f2937",borderRadius:"8px",padding:"10px 14px"},
  };

  return (
    <div style={{height:"100vh",background:"#060b14",color:"#e5e7eb",display:"flex",flexDirection:"column"}}>
      {/* HEADER */}
      <div style={{borderBottom:"1px solid #111827",padding:"0 16px",height:"56px",display:"flex",alignItems:"center",gap:"12px",flexShrink:0}}>
        <span style={{fontSize:"26px"}}>🌊</span>
        <div>
          <div style={{fontSize:"18px",fontWeight:700,color:"#f9fafb"}}>Vakantie BV</div>
          <div style={{fontSize:"13px",color:"#4b5563",fontFamily:"monospace"}}>ONTOLOGY-DRIVEN AGENT · RDFLib + SPARQL</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:"6px",alignItems:"center"}}>
          <div style={{display:"flex",borderRadius:"20px",border:"1px solid #1f2937",overflow:"hidden",marginRight:"8px"}}>
            {[{r:"reisagent",l:"👤 Reisagent"},{r:"admin",l:"🔧 Admin"}].map(({r,l})=>(
              <button key={r} onClick={()=>setAgentRole(r)} style={{padding:"5px 12px",border:"none",background:agentRole===r?(r==="admin"?"rgba(239,68,68,0.2)":"rgba(249,115,22,0.15)"):"transparent",color:agentRole===r?(r==="admin"?"#f87171":"#f97316"):"#4b5563",fontSize:"14px",cursor:"pointer",fontFamily:"monospace"}}>
                {l}
              </button>
            ))}
          </div>
          {[{v:"chat",l:"💬 Agent"},{v:"db",l:"🗄️ Database"},{v:"onto",l:"🕸️ Ontologie"}].map(({v,l})=>(
            <button key={v} onClick={()=>setView(v)} style={{padding:"5px 14px",borderRadius:"20px",border:`1px solid ${view===v?"#f97316":"#1f2937"}`,background:view===v?"rgba(249,115,22,0.15)":"transparent",color:view===v?"#f97316":"#4b5563",fontSize:"14px",cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* CHAT */}
      {view==="chat" && (
        <div style={S.panel}>
          <div style={{padding:"8px 12px",borderBottom:"1px solid #111827",display:"flex",flexWrap:"wrap",gap:"4px"}}>
            {QUICK.map(q=>(
              <button key={q.label} onClick={()=>send(q.text)} disabled={loading}
                style={{padding:"4px 12px",borderRadius:"20px",border:"1px solid #1f2937",background:"rgba(249,115,22,0.07)",color:"#9ca3af",fontSize:"13px",cursor:"pointer",fontFamily:"monospace"}}>
                {q.label}
              </button>
            ))}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"16px 14px"}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:"12px"}}>
                {m.role==="assistant"&&(
                  <div style={{width:"32px",height:"32px",borderRadius:"50%",background:"linear-gradient(135deg,#f97316,#dc2626)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",marginRight:"8px",flexShrink:0,marginTop:"2px"}}>🤖</div>
                )}
                {m.role==="user"
                  ? <div style={{maxWidth:"80%",padding:"10px 14px",borderRadius:"16px 16px 4px 16px",background:"linear-gradient(135deg,#ea580c,#c2410c)",fontSize:"15px",lineHeight:"1.7",whiteSpace:"pre-wrap"}}>{m.text}</div>
                  : <div className="md" style={{maxWidth:"80%",padding:"10px 14px",borderRadius:"16px 16px 16px 4px",background:"rgba(255,255,255,0.05)",border:"1px solid #1f2937",fontSize:"15px",lineHeight:"1.7"}} dangerouslySetInnerHTML={{__html:DOMPurify.sanitize(marked.parse(m.text))}}/>
                }
              </div>
            ))}
            {loading&&(
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
                <div style={{width:"32px",height:"32px",borderRadius:"50%",background:"linear-gradient(135deg,#f97316,#dc2626)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px"}}>🤖</div>
                <div style={{padding:"10px 16px",background:"rgba(255,255,255,0.05)",border:"1px solid #1f2937",borderRadius:"16px 16px 16px 4px",display:"flex",gap:"5px",alignItems:"center"}}>
                  <span className="dot"/><span className="dot"/><span className="dot"/>
                </div>
              </div>
            )}
            <div ref={chatEnd}/>
          </div>
          <div style={{padding:"12px 14px",borderTop:"1px solid #111827"}}>
            <div style={{display:"flex",gap:"8px"}}>
              <textarea value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);}}}
                placeholder="Stel een vraag of geef een opdracht…" disabled={loading} rows={2}
                style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid #1f2937",borderRadius:"10px",padding:"10px 12px",color:"#e5e7eb",fontSize:"15px",resize:"none",lineHeight:"1.5"}}/>
              <button onClick={()=>send(input)} disabled={loading||!input.trim()}
                style={{width:"40px",height:"40px",marginTop:"auto",borderRadius:"10px",background:loading||!input.trim()?"#1f2937":"linear-gradient(135deg,#ea580c,#c2410c)",border:"none",cursor:"pointer",color:"white",fontSize:"18px",flexShrink:0}}>
                ↑
              </button>
            </div>
          </div>
        </div>
      )}

      {/* DATABASE */}
      {view==="db" && (
        <div style={S.panel}>
          <div style={{padding:"8px 12px",borderBottom:"1px solid #111827",display:"flex",gap:"4px",flexWrap:"wrap",alignItems:"center"}}>
            {classes.map(c=>(
              <button key={c.table} onClick={()=>setTab(c.table)}
                style={{padding:"5px 14px",borderRadius:"6px",border:`1px solid ${tab===c.table?c.color+"80":"#1f2937"}`,background:tab===c.table?c.color+"18":"transparent",color:tab===c.table?c.color:"#4b5563",fontSize:"14px",cursor:"pointer",fontFamily:"monospace"}}>
                {c.icon} {c.table}
              </button>
            ))}
            <div style={{marginLeft:"auto",fontSize:"12px",color:"#374151",fontFamily:"monospace"}}>
              {Object.entries(db).map(([t,r])=>`${t[0].toUpperCase()}:${(r||[]).length}`).join(" ")}
            </div>
          </div>
          {(() => {
            const cls = findClassByTable(tab);
            return (
              <div style={{padding:"8px 14px",borderBottom:"1px solid #111827",background:(cls?.color||"#6b7280")+"0d",display:"flex",gap:"12px",alignItems:"center"}}>
                <span style={{fontFamily:"monospace",fontSize:"14px",color:cls?.color,fontWeight:600}}>{cls?.id||tab}</span>
                <span style={{fontSize:"13px",color:"#4b5563"}}>⊂ {cls?.super||"?"}</span>
                <span style={{fontSize:"13px",color:"#374151"}}>→ db:{tab} · pk:{getPk(tab)||"?"}</span>
              </div>
            );
          })()}
          <div style={{flex:1,overflowY:"auto",padding:"10px 14px"}}>
            <DataTable rows={db[tab]||[]} flashSet={flashMap[tab]||new Set()} pk={getPk(tab)}/>
          </div>
          <div style={{borderTop:"1px solid #111827",padding:"8px 14px"}}>
            <div style={{fontSize:"12px",color:"#4b5563",fontFamily:"monospace"}}>
              BRON: RDFLib Triplestore via SPARQL · Data ververst na elke chat interactie
            </div>
          </div>
        </div>
      )}

      {/* ONTOLOGY */}
      {view==="onto" && (
        <div style={{flex:1,overflowY:"auto",padding:"16px"}}>
          <div style={{fontSize:"14px",color:"#4b5563",fontFamily:"monospace",marginBottom:"8px"}}>OWL KLASSEN GRAAF</div>
          <div style={{background:"#0a0f1a",border:"1px solid #1f2937",borderRadius:"12px",padding:"12px"}}>
            <Graph active={activeC} classes={classes} rels={rels}/>
          </div>
          <div style={{marginTop:"12px",fontSize:"14px",color:"#4b5563",fontFamily:"monospace",marginBottom:"8px"}}>TURTLE SERIALISATIE</div>
          <pre style={{background:"#0a0f1a",border:"1px solid #1f2937",borderRadius:"8px",padding:"14px",fontSize:"13px",color:"#9ca3af",fontFamily:"monospace",overflowX:"auto",lineHeight:"1.8",whiteSpace:"pre-wrap"}}>
            {turtle || "Laden..."}
          </pre>
          <div style={{marginTop:"12px",fontSize:"14px",color:"#4b5563",fontFamily:"monospace",marginBottom:"8px"}}>AGENT TOOLS (JSON Schema)</div>
          <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
            {tools.map(t=>(
              <div key={t.name} style={{background:"rgba(249,115,22,0.06)",border:"1px solid rgba(249,115,22,0.2)",borderRadius:"8px",padding:"10px 14px"}}>
                <div style={{fontFamily:"monospace",fontSize:"14px",color:"#f97316",fontWeight:600,marginBottom:"3px"}}>⚡ {t.name}()</div>
                <div style={{fontSize:"13px",color:"#9ca3af",marginBottom:"4px",whiteSpace:"pre-wrap"}}>{t.description}</div>
                <div style={{fontSize:"12px",color:"#4b5563",fontFamily:"monospace"}}>
                  required: [{(t.input_schema?.required||[]).join(", ")}]
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
