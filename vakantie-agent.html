<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vakantie BV — Ontology Agent Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#060b14;color:#e5e7eb;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#f97316;animation:bounce 1.2s infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  textarea:focus,input:focus{outline:none}
  button{transition:opacity 0.15s}
  button:hover:not(:disabled){opacity:0.8}
  button:disabled{cursor:not-allowed;opacity:0.5}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ─── DATABASE ───────────────────────────────────────────────
const createDB = () => ({
  klanten: [
    {klant_id:1,naam:"Anna de Vries",email:"anna@example.nl",loyalty_punten:1250,lid_sinds:"2021-03-15"},
    {klant_id:2,naam:"Pieter Janssen",email:"pieter@example.nl",loyalty_punten:340,lid_sinds:"2023-06-01"},
    {klant_id:3,naam:"Sofia Martins",email:"sofia@example.nl",loyalty_punten:2870,lid_sinds:"2019-11-20"},
    {klant_id:4,naam:"Lars van den Berg",email:"lars@example.nl",loyalty_punten:0,lid_sinds:"2024-01-10"},
  ],
  bestemmingen: [
    {bestemming_id:1,naam:"Barcelona",land:"Spanje",klimaat:"Mediterraan",score:9.2},
    {bestemming_id:2,naam:"Bali",land:"Indonesië",klimaat:"Tropisch",score:9.5},
    {bestemming_id:3,naam:"Marrakech",land:"Marokko",klimaat:"Droog",score:8.7},
    {bestemming_id:4,naam:"New York",land:"USA",klimaat:"Gematigd",score:9.0},
  ],
  hotels: [
    {hotel_id:1,naam:"Hotel Arts",bestemming_id:1,sterren:5,prijs:320,kamers:12},
    {hotel_id:2,naam:"Catalonia Square",bestemming_id:1,sterren:4,prijs:145,kamers:8},
    {hotel_id:3,naam:"COMO Uma Ubud",bestemming_id:2,sterren:5,prijs:280,kamers:6},
    {hotel_id:4,naam:"Komaneka at Bisma",bestemming_id:2,sterren:4,prijs:195,kamers:15},
    {hotel_id:5,naam:"La Mamounia",bestemming_id:3,sterren:5,prijs:410,kamers:3},
    {hotel_id:6,naam:"The Plaza",bestemming_id:4,sterren:5,prijs:895,kamers:20},
  ],
  boekingen: [
    {boeking_id:1,klant_id:1,hotel_id:1,check_in:"2025-07-15",check_out:"2025-07-22",personen:2,status:"bevestigd",prijs:2240},
    {boeking_id:2,klant_id:3,hotel_id:3,check_in:"2025-08-01",check_out:"2025-08-10",personen:2,status:"bevestigd",prijs:2520},
    {boeking_id:3,klant_id:2,hotel_id:2,check_in:"2025-06-20",check_out:"2025-06-27",personen:1,status:"geannuleerd",prijs:1015},
    {boeking_id:4,klant_id:3,hotel_id:6,check_in:"2025-12-26",check_out:"2026-01-02",personen:2,status:"in_behandeling",prijs:6265},
  ],
});

// ─── ONTOLOGY META ───────────────────────────────────────────
const CLASSES = [
  {id:"vakantie:Klant",     label:"Klant",     icon:"👤",table:"klanten",      pk:"klant_id",     color:"#f97316",super:"foaf:Person"},
  {id:"vakantie:Bestemming",label:"Bestemming",icon:"🗺️",table:"bestemmingen",pk:"bestemming_id",color:"#22c55e",super:"schema:Place"},
  {id:"vakantie:Hotel",     label:"Hotel",     icon:"🏨",table:"hotels",       pk:"hotel_id",     color:"#3b82f6",super:"schema:LodgingBusiness"},
  {id:"vakantie:Boeking",   label:"Boeking",   icon:"📋",table:"boekingen",    pk:"boeking_id",   color:"#a855f7",super:"schema:Reservation"},
];
const RELS = [
  {from:"vakantie:Klant",  to:"vakantie:Boeking",   label:"heeftBoeking"},
  {from:"vakantie:Boeking",to:"vakantie:Hotel",     label:"isGeboektIn"},
  {from:"vakantie:Hotel",  to:"vakantie:Bestemming",label:"isGevestigdIn"},
];
const POS = {"vakantie:Klant":{x:70,y:60},"vakantie:Boeking":{x:200,y:155},"vakantie:Hotel":{x:330,y:60},"vakantie:Bestemming":{x:330,y:240}};
const PKM = {klanten:"klant_id",bestemmingen:"bestemming_id",hotels:"hotel_id",boekingen:"boeking_id"};

// ─── TOOLS (backend — getoond in ontology view) ─────────────
const TOOLS = [
  {name:"sparql_select",description:"Voer een SPARQL SELECT query uit op de RDFLib triplestore. De agent genereert zelf de SPARQL op basis van de ontologie.",
   input_schema:{type:"object",properties:{sparql:{type:"string"}},required:["sparql"]}},
  {name:"sparql_update",description:"Voer een SPARQL UPDATE (INSERT/DELETE) uit. Voor aanmaken, wijzigen of verwijderen van triples in de triplestore.",
   input_schema:{type:"object",properties:{sparql:{type:"string"},action_type:{type:"string"}},required:["sparql"]}},
  {name:"get_ontology",description:"Haal de volledige OWL ontologie op als Turtle. Gebruik als de agent onzeker is over property namen of klassenstructuur.",
   input_schema:{type:"object",properties:{},required:[]}},
];

const QUICK = [
  {label:"📋 Boekingen Sofia",   text:"Wat zijn alle boekingen van Sofia Martins (klant 3)?"},
  {label:"🏖️ Hotels Bali",       text:"Welke hotels in Bali hebben nog kamers beschikbaar?"},
  {label:"➕ Boek voor Lars",    text:"Boek voor Lars van den Berg (klant 4) hotel Komaneka at Bisma (hotel_id 4) in Bali van 15 september tot 22 september 2025 voor 2 personen."},
  {label:"❌ Annuleer boeking 4",text:"Annuleer boeking 4 van Sofia Martins."},
  {label:"⭐ Punten Anna",       text:"Voeg 500 bonus loyalty punten toe aan Anna de Vries (klant 1)."},
];

// ─── ONTOLOGY GRAPH ──────────────────────────────────────────
function Graph({active}) {
  return (
    <svg viewBox="0 10 400 300" style={{width:"100%",height:"210px"}}>
      <defs>
        <marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0L6,3L0,6Z" fill="#374151"/>
        </marker>
        <marker id="aa" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0L6,3L0,6Z" fill="#f97316"/>
        </marker>
      </defs>
      {RELS.map(r=>{
        const f=POS[r.from],t=POS[r.to];
        const dx=t.x-f.x,dy=t.y-f.y,len=Math.sqrt(dx*dx+dy*dy);
        const ux=dx/len,uy=dy/len,pad=30;
        const on=active.has(r.from)||active.has(r.to);
        return (
          <g key={r.label}>
            <line x1={f.x+ux*pad} y1={f.y+uy*pad} x2={t.x-ux*pad} y2={t.y-uy*pad}
              stroke={on?"#f97316":"#1f2937"} strokeWidth={on?2:1.5}
              strokeDasharray={on?"none":"4,3"} markerEnd={`url(#${on?"aa":"a"})`}
              style={{transition:"all 0.4s"}}/>
            <text x={(f.x+t.x)/2} y={(f.y+t.y)/2-6} textAnchor="middle" fontSize="8"
              fill={on?"#f97316":"#4b5563"} fontFamily="monospace">{r.label}</text>
          </g>
        );
      })}
      {CLASSES.map(c=>{
        const p=POS[c.id],on=active.has(c.id);
        return (
          <g key={c.id}>
            <circle cx={p.x} cy={p.y} r={27} fill={on?c.color+"20":"#0f172a"}
              stroke={on?c.color:"#1f2937"} strokeWidth={on?2.5:1.5}
              style={{filter:on?`drop-shadow(0 0 10px ${c.color})`:"none",transition:"all 0.4s"}}/>
            <text x={p.x} y={p.y-2} textAnchor="middle" fontSize="15">{c.icon}</text>
            <text x={p.x} y={p.y+14} textAnchor="middle" fontSize="8" fontWeight="600"
              fill={on?c.color:"#6b7280"} fontFamily="monospace">{c.label}</text>
            <rect x={p.x-27} y={p.y+21} width="54" height="13" rx="3"
              fill={on?c.color+"18":"#111827"} stroke={on?c.color:"#1f2937"} strokeWidth="1"/>
            <text x={p.x} y={p.y+30} textAnchor="middle" fontSize="7"
              fill={on?c.color:"#374151"} fontFamily="monospace">db:{c.table}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ─── DATA TABLE ───────────────────────────────────────────────
function DataTable({rows,flashSet,pk}) {
  if (!rows.length) return <div style={{color:"#4b5563",fontSize:"11px",padding:"8px"}}>Leeg</div>;
  const cols = Object.keys(rows[0]);
  return (
    <div style={{overflowX:"auto",fontSize:"10px",fontFamily:"monospace"}}>
      <table style={{borderCollapse:"collapse",minWidth:"500px",width:"100%"}}>
        <thead>
          <tr style={{borderBottom:"1px solid #1f2937"}}>
            {cols.map(c=><th key={c} style={{padding:"4px 8px",textAlign:"left",color:"#4b5563",fontWeight:500,whiteSpace:"nowrap"}}>{c}</th>)}
          </tr>
        </thead>
        <tbody>
          {rows.map((row,i)=>{
            const isF = flashSet && flashSet.has(row[pk]);
            return (
              <tr key={i} style={{background:isF?"rgba(249,115,22,0.15)":i%2?"rgba(255,255,255,0.02)":"transparent",borderLeft:isF?"2px solid #f97316":"2px solid transparent",transition:"all 0.5s"}}>
                {cols.map(c=>(
                  <td key={c} style={{padding:"3px 8px",color:c===pk?"#f97316":"#d1d5db",whiteSpace:"nowrap"}}>
                    {c==="status"
                      ?<span style={{padding:"1px 6px",borderRadius:"12px",fontSize:"9px",background:row[c]==="bevestigd"?"rgba(34,197,94,0.2)":row[c]==="geannuleerd"?"rgba(239,68,68,0.2)":"rgba(234,179,8,0.2)",color:row[c]==="bevestigd"?"#4ade80":row[c]==="geannuleerd"?"#f87171":"#fbbf24"}}>{row[c]}</span>
                      :c==="sterren"?"★".repeat(row[c])
                      :c==="prijs"||c==="loyalty_punten"?`€${Number(row[c]).toLocaleString("nl-NL")}`
                      :String(row[c])}
                  </td>
                ))}
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────
function App() {
  const [db, setDb] = useState(createDB());
  const dbRef = useRef(db);
  useEffect(()=>{dbRef.current=db;},[db]);

  const [tab, setTab] = useState("klanten");
  const [flashMap, setFlashMap] = useState({});
  const [activeC, setActiveC] = useState(new Set());
  const [traces, setTraces] = useState([]);
  const [msgs, setMsgs] = useState([
    {role:"assistant",text:"Hallo! Ik ben de Vakantie BV database-agent. Ik gebruik de OWL-ontologie en een RDFLib triplestore om vragen te vertalen naar SPARQL queries. Klik een snelkoppeling of stel een vraag!"}
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [view, setView] = useState("chat");
  const [agentRole, setAgentRole] = useState("klant");
  const chatEnd = useRef(null);

  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);

  const flash = useCallback((table, pks) => {
    const cls = CLASSES.find(c=>c.table===table);
    if (cls) {
      setActiveC(p=>new Set([...p,cls.id]));
      setTimeout(()=>setActiveC(p=>{const n=new Set(p);n.delete(cls.id);return n;}),2000);
    }
    setTab(table);
    setFlashMap(p=>({...p,[table]:new Set(pks)}));
    setTimeout(()=>setFlashMap(p=>({...p,[table]:new Set()})),2500);
  },[]);

  const API_BASE = "http://localhost:8000";

  const refreshState = async () => {
    try {
      const res = await fetch(`${API_BASE}/state`);
      if (res.ok) {
        const state = await res.json();
        setDb(state);
        dbRef.current = state;
      }
    } catch(e) { console.warn("State refresh failed:", e); }
  };

  useEffect(() => { refreshState(); }, []);

  const send = async(text) => {
    if (!text.trim() || loading) return;
    setLoading(true); setInput("");
    setMsgs(p=>[...p,{role:"user",text}]);
    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:text, role:agentRole})
      });
      if (!res.ok) { const e=await res.text(); throw new Error(`API ${res.status}: ${e.slice(0,100)}`); }
      const data = await res.json();
      setMsgs(p=>[...p,{role:"assistant",text:data.response}]);
      await refreshState();
    } catch(e) { setMsgs(p=>[...p,{role:"assistant",text:`Fout: ${e.message}`}]); }
    setLoading(false);
  };

  const S = { // shared styles
    panel: {flex:1,display:"flex",flexDirection:"column",overflow:"hidden"},
    hdr: {padding:"8px 14px",borderBottom:"1px solid #111827",fontSize:"9px",color:"#4b5563",fontFamily:"monospace",letterSpacing:"0.1em"},
    card: {background:"rgba(255,255,255,0.04)",border:"1px solid #1f2937",borderRadius:"8px",padding:"10px 14px"},
  };

  return (
    <div style={{height:"100vh",background:"#060b14",color:"#e5e7eb",display:"flex",flexDirection:"column"}}>
      {/* HEADER */}
      <div style={{borderBottom:"1px solid #111827",padding:"0 16px",height:"50px",display:"flex",alignItems:"center",gap:"12px",flexShrink:0}}>
        <span style={{fontSize:"22px"}}>🌊</span>
        <div>
          <div style={{fontSize:"14px",fontWeight:700,color:"#f9fafb"}}>Vakantie BV</div>
          <div style={{fontSize:"9px",color:"#4b5563",fontFamily:"monospace"}}>ONTOLOGY-DRIVEN AGENT · RDFLib + SPARQL</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:"6px",alignItems:"center"}}>
          <div style={{display:"flex",borderRadius:"20px",border:"1px solid #1f2937",overflow:"hidden",marginRight:"8px"}}>
            {[{r:"klant",l:"👤 Klant"},{r:"admin",l:"🔧 Admin"}].map(({r,l})=>(
              <button key={r} onClick={()=>setAgentRole(r)} style={{padding:"4px 10px",border:"none",background:agentRole===r?(r==="admin"?"rgba(239,68,68,0.2)":"rgba(249,115,22,0.15)"):"transparent",color:agentRole===r?(r==="admin"?"#f87171":"#f97316"):"#4b5563",fontSize:"10px",cursor:"pointer",fontFamily:"monospace"}}>
                {l}
              </button>
            ))}
          </div>
          {[{v:"chat",l:"💬 Agent"},{v:"db",l:"🗄️ Database"},{v:"onto",l:"🕸️ Ontologie"}].map(({v,l})=>(
            <button key={v} onClick={()=>setView(v)} style={{padding:"4px 12px",borderRadius:"20px",border:`1px solid ${view===v?"#f97316":"#1f2937"}`,background:view===v?"rgba(249,115,22,0.15)":"transparent",color:view===v?"#f97316":"#4b5563",fontSize:"11px",cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* CHAT */}
      {view==="chat" && (
        <div style={S.panel}>
          <div style={{padding:"8px 12px",borderBottom:"1px solid #111827",display:"flex",flexWrap:"wrap",gap:"4px"}}>
            {QUICK.map(q=>(
              <button key={q.label} onClick={()=>send(q.text)} disabled={loading}
                style={{padding:"3px 10px",borderRadius:"20px",border:"1px solid #1f2937",background:"rgba(249,115,22,0.07)",color:"#9ca3af",fontSize:"10px",cursor:"pointer",fontFamily:"monospace"}}>
                {q.label}
              </button>
            ))}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"16px 14px"}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:"12px"}}>
                {m.role==="assistant"&&(
                  <div style={{width:"28px",height:"28px",borderRadius:"50%",background:"linear-gradient(135deg,#f97316,#dc2626)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",marginRight:"8px",flexShrink:0,marginTop:"2px"}}>🤖</div>
                )}
                <div style={{maxWidth:"80%",padding:"10px 14px",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:m.role==="user"?"linear-gradient(135deg,#ea580c,#c2410c)":"rgba(255,255,255,0.05)",border:m.role==="user"?"none":"1px solid #1f2937",fontSize:"12px",lineHeight:"1.7",whiteSpace:"pre-wrap"}}>
                  {m.text}
                </div>
              </div>
            ))}
            {loading&&(
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
                <div style={{width:"28px",height:"28px",borderRadius:"50%",background:"linear-gradient(135deg,#f97316,#dc2626)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px"}}>🤖</div>
                <div style={{padding:"10px 16px",background:"rgba(255,255,255,0.05)",border:"1px solid #1f2937",borderRadius:"16px 16px 16px 4px",display:"flex",gap:"5px",alignItems:"center"}}>
                  <span className="dot"/><span className="dot"/><span className="dot"/>
                </div>
              </div>
            )}
            <div ref={chatEnd}/>
          </div>
          <div style={{padding:"12px 14px",borderTop:"1px solid #111827"}}>
            <div style={{display:"flex",gap:"8px"}}>
              <textarea value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);}}}
                placeholder="Stel een vraag of geef een opdracht…" disabled={loading} rows={2}
                style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid #1f2937",borderRadius:"10px",padding:"10px 12px",color:"#e5e7eb",fontSize:"12px",resize:"none",lineHeight:"1.5"}}/>
              <button onClick={()=>send(input)} disabled={loading||!input.trim()}
                style={{width:"40px",height:"40px",marginTop:"auto",borderRadius:"10px",background:loading||!input.trim()?"#1f2937":"linear-gradient(135deg,#ea580c,#c2410c)",border:"none",cursor:"pointer",color:"white",fontSize:"18px",flexShrink:0}}>
                ↑
              </button>
            </div>
          </div>
        </div>
      )}

      {/* DATABASE */}
      {view==="db" && (
        <div style={S.panel}>
          <div style={{padding:"8px 12px",borderBottom:"1px solid #111827",display:"flex",gap:"4px",flexWrap:"wrap",alignItems:"center"}}>
            {CLASSES.map(c=>(
              <button key={c.table} onClick={()=>setTab(c.table)}
                style={{padding:"4px 12px",borderRadius:"6px",border:`1px solid ${tab===c.table?c.color+"80":"#1f2937"}`,background:tab===c.table?c.color+"18":"transparent",color:tab===c.table?c.color:"#4b5563",fontSize:"11px",cursor:"pointer",fontFamily:"monospace"}}>
                {c.icon} {c.table}
              </button>
            ))}
            <div style={{marginLeft:"auto",fontSize:"9px",color:"#374151",fontFamily:"monospace"}}>
              {Object.entries(db).map(([t,r])=>`${t[0].toUpperCase()}:${(r||[]).length}`).join(" ")}
            </div>
          </div>
          {(() => {
            const cls = CLASSES.find(c=>c.table===tab);
            return (
              <div style={{padding:"8px 14px",borderBottom:"1px solid #111827",background:cls?.color+"0d",display:"flex",gap:"12px",alignItems:"center"}}>
                <span style={{fontFamily:"monospace",fontSize:"11px",color:cls?.color,fontWeight:600}}>{cls?.id}</span>
                <span style={{fontSize:"10px",color:"#4b5563"}}>⊂ {cls?.super}</span>
                <span style={{fontSize:"10px",color:"#374151"}}>→ db:{tab} · pk:{PKM[tab]}</span>
              </div>
            );
          })()}
          <div style={{flex:1,overflowY:"auto",padding:"10px 14px"}}>
            <DataTable rows={db[tab]||[]} flashSet={flashMap[tab]||new Set()} pk={PKM[tab]}/>
          </div>
          <div style={{borderTop:"1px solid #111827",padding:"8px 14px"}}>
            <div style={{fontSize:"9px",color:"#4b5563",fontFamily:"monospace"}}>
              BRON: RDFLib Triplestore via SPARQL · Data ververst na elke chat interactie
            </div>
          </div>
        </div>
      )}

      {/* ONTOLOGY */}
      {view==="onto" && (
        <div style={{flex:1,overflowY:"auto",padding:"16px"}}>
          <div style={{fontSize:"10px",color:"#4b5563",fontFamily:"monospace",marginBottom:"8px"}}>OWL KLASSEN GRAAF</div>
          <div style={{background:"#0a0f1a",border:"1px solid #1f2937",borderRadius:"12px",padding:"12px"}}>
            <Graph active={activeC}/>
          </div>
          <div style={{marginTop:"12px",fontSize:"10px",color:"#4b5563",fontFamily:"monospace",marginBottom:"8px"}}>TURTLE SERIALISATIE</div>
          <pre style={{background:"#0a0f1a",border:"1px solid #1f2937",borderRadius:"8px",padding:"14px",fontSize:"10px",color:"#9ca3af",fontFamily:"monospace",overflowX:"auto",lineHeight:"1.8"}}>
{`@prefix vakantie: <https://vakantie.nl/ontology#> .
@prefix owl:      <http://www.w3.org/2002/07/owl#> .
@prefix rdfs:     <http://www.w3.org/2000/01/rdf-schema#> .
@prefix foaf:     <http://xmlns.com/foaf/0.1/> .
@prefix schema:   <https://schema.org/> .

# ── Klassen ──────────────────────────────────────────────
vakantie:Klant a owl:Class ;
    rdfs:label "Klant"@nl ;
    rdfs:subClassOf foaf:Person ;
    vakantie:mapsTo "klanten" ;
